test
  TESTROOT=testroot-value
  LOCALVAR=test
  DATE_VAR=$(echo $RANDOM)
  DATE_VAR_CACHED=$(echo $RANDOM) # cache
  QUOTED_VAR=val'withquote
  SPACED_VAR=  val  spaced
  TILDE_VAR=~/foo
  TILDE_VAR_EXACT=~
  TILDE_VAR_MID=a~/foo
  TILDE_PATH_NOT_PATH=:/bin:~/foo

test/foo
  +PATH=~/prefix-that-does-not-exist
  +TESTROOT=now-with-prefix-
  LOCALVAR=test-foo

test/foo/bar
  LOCALVAR=test-foo-bar

test/tilde
  PATH=~/bin:/usr/bin:~/local/bin:~

/
  ROOT_VAR=root-zone
